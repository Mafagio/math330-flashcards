<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mes flashcards — Cours</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="landing.css">
</head>
<body>

<header>
  <h1>Mes flashcards</h1>
  <p class="muted">Choisis un cours pour réviser — cours &amp; exercices, en cartes (énoncé → réponse).</p>
</header>

<main>
  <div id="courses" class="grid"></div>
  <p id="empty" class="muted small hidden">Aucun cours pour l'instant. Ajoute une entrée dans <code>courses.js</code>.</p>
</main>

<footer class="muted small">
  3 modes par cours : Apprendre · Réviser · Test. Progression sauvegardée par cours dans le navigateur.
</footer>

<script src="courses.js"></script>
<script>
  const COURSES = window.COURSES || [];
  const grid = document.getElementById("courses");
  if (!COURSES.length) document.getElementById("empty").classList.remove("hidden");
  COURSES.forEach((c, i) => {
    const el = document.createElement(c.available ? "a" : "div");
    el.className = "course" + (c.available ? "" : " soon");
    if (c.available) el.href = c.dir;
    el.innerHTML =
      `<div class="num">Cours ${i + 1}</div>
       <div class="code">${c.code || ""}</div>
       <div class="name">${c.name}</div>
       <div class="meta">${c.available ? (c.count + " cartes") : "bientôt disponible"}</div>`;
    grid.appendChild(el);
  });
</script>
</body>
</html>
